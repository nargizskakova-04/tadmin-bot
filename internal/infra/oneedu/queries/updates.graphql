query GetAstanaUpdates(
  $startDate: timestamptz!
  $endDate: timestamptz!
) {
  total_astana: user_aggregate(where: {
    _or: [
      { progresses: { campus: { _eq: "astanahub" } } },
      { _not: { progresses: {} } },
      { roles: {} }
    ]
  }) {
    aggregate {
      count
    }
  }
  succeeded_astana: progress_aggregate(
    where: {
      path: { _eq: "/astanahub/onboarding/games" }
      isDone: { _eq: true }
      grade: { _gte: 1 }
      updatedAt: { _gt: $startDate, _lt: $endDate }
      _not: {
        user: {
          roles: {
            slug: { _in: ["admin", "campus_admin_astanahub"] }
          }
        }
      }
    }
    distinct_on: [userId]
  ) {
    aggregate {
      count
    }
  }

  checkin_astana: registration_user_aggregate(
    where: {
      registration: {
        path: { _eq: "/astanahub/onboarding/checkin" }
        endAt: { _gt: $endDate }
      }
    }
  ) {
    aggregate {
      count
    }
  }
}

query GetRegistrationCountByPath(
  $path: String!
  $endDate: timestamptz!
) {
  registrations: registration_user_aggregate(
    where: {
      registration: {
        path: { _eq: $path }
        endAt: { _gt: $endDate }
      }
    }
  ) {
    aggregate {
      count
    }
  }
}

query all_campuses {
  object(where: { type: { _eq: "campus" } }) {
    name
  }
}

query GetEventByID($id: Int!) {
  event(where: { id: { _eq: $id } }) {
    id
    path
    startAt
    endAt
    object { type, name }
  }
}

query region_stats(
  $campus: String!
  $startDate: timestamptz!
  $endDate: timestamptz!
  $adminRole: String!
  $gamesPath: String!
  $checkinPath: String!
  $corePath: String!
) {
  signed_up_no_onboarding: user_aggregate(
    where: {
      _and: [
        { campus: { _is_null: true } }
        { progresses: { campus: { _eq: $campus } } }
        { _not: { roles: {} } }
      ]
    }
  ) {
    aggregate {
      count
    }
  }

  succeeded: progress_aggregate(
    where: {
      path: { _eq: $gamesPath }
      isDone: { _eq: true }
      grade: { _gte: 1 }
      updatedAt: { _gt: $startDate, _lt: $endDate }
      _not: {
        user: {
          roles: {
            slug: { _in: ["admin", $adminRole] }
          }
        }
      }
    }
    distinct_on: [userId]
  ) {
    aggregate {
      count
    }
  }

  checkin: registration_user_aggregate(
    where: {
      registration: {
        path: { _eq: $checkinPath }
        endAt: { _gt: $endDate }
      }
    }
  ) {
    aggregate {
      count
    }
  }

  core: event_user_aggregate(
    where: {
      event: {
        path: {
          _eq: $corePath
        }
      }
    }
  ) {
    aggregate {
      count
    }
  }
}
