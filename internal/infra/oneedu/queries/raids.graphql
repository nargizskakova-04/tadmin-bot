query GetUserByLogin($login: String!) {
  user(where: { login: { _eq: $login } }) {
    id
    login
    email
    attrs
  }
}

query GetCurrentPiscineId($name: String!) {
  event(where: {
    object: { name: { _eq: $name } }
    startAt: { _lte: "now()" }
    endAt: { _gte: "now()" }
    path: {_iregex: "astanahub"}
  }) {
    id
    startAt
    endAt
  }
}
